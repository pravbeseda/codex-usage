name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - run: npm install

      - run: npm run lint

      - run: npm test

      - run: node ./bin/codex-usage.js --once --sessions-dir ./test/fixtures/basic

      - run: node ./bin/codex-usage.js --json --sessions-dir ./test/fixtures/basic

      - run: node ./bin/codex-usage.js --help
